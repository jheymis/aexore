@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap');

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --font-display:'Outfit',system-ui,sans-serif;
  --font-body:'Manrope',system-ui,sans-serif;
}
[data-theme="dark"]{
  --bg:#06080b; --bg-2:#0a0e13; --bg-grad-1:#0c1a26; --bg-grad-2:#070b10;
  --surface:#0f151c; --surface-2:#151d26; --surface-3:#1c2731; --surface-hi:#22303c;

  --primary:#2f86bd; --primary-2:#3f9bd6; --primary-deep:#16597b; --primary-soft:rgba(47,134,189,0.16);
  --green:#2f9a6f; --green-soft:rgba(47,154,111,0.16);
  --gold:#d8b06a; --gold-2:#e8c886; --gold-soft:rgba(216,176,106,0.15);
  --muscle:#ffd23f; --muscle-glow:rgba(255,210,63,0.55);
  --danger:#df6a6a; --success:#4cb487;
  --shadow:0 18px 50px -18px rgba(0,0,0,0.85); --shadow-sm:0 8px 22px -10px rgba(0,0,0,0.7);
  --body-fill:#2a3742; --body-stroke:rgba(255,255,255,0.10);
}
[data-theme="light"]{
  --bg:#eaeef2; --bg-2:#e2e8ee; --bg-grad-1:#dbe6ee; --bg-grad-2:#eef2f6;
  --surface:#ffffff; --surface-2:#f5f8fa; --surface-3:#eef2f6; --surface-hi:#e6edf2;
  --border:rgba(12,22,32,0.09); --border-2:rgba(12,22,32,0.14); --border-3:rgba(12,22,32,0.2);
  --text:#0d151d; --dim:#52616f; --faint:#8593a0;
  --primary:#1d6f9c; --primary-2:#2484b6; --primary-deep:#134e6f; --primary-soft:rgba(29,111,156,0.12);
  --green:#1f7a55; --green-soft:rgba(31,122,85,0.12);
  --gold:#b78a3c; --gold-2:#caa055; --gold-soft:rgba(183,138,60,0.14);
  --muscle:#f5b400; --muscle-glow:rgba(245,180,0,0.45);
  --danger:#c84b4b; --success:#1f9568;
  --shadow:0 18px 44px -20px rgba(20,40,60,0.35); --shadow-sm:0 8px 20px -12px rgba(20,40,60,0.25);
  --body-fill:#c4d0d9; --body-stroke:rgba(12,22,32,0.12);
}

html,body,#root{margin:0;padding:0;height:100%;}
body{font-family:var(--font-body);background:#000;}
.ax-root{font-family:var(--font-body);min-height:100dvh;width:100%;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(120% 120% at 50% -10%, var(--bg-grad-1) 0%, var(--bg-2) 45%, var(--bg) 100%);
  color:var(--text);overflow:hidden;}
.shell{position:relative;width:100%;max-width:480px;height:100dvh;max-height:1000px;overflow:hidden;
  background:linear-gradient(180deg,var(--bg-2),var(--bg));display:flex;flex-direction:column;}
@media(min-width:520px){
  .ax-root{padding:18px;}
  .shell{border-radius:30px;border:1px solid var(--border-2);box-shadow:0 40px 120px -30px rgba(0,0,0,0.8);height:calc(100dvh - 36px);}
}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;animation:fadeIn .4s ease both;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{width:0;height:0;}
.pad{padding:18px;}
.pb-nav{padding-bottom:104px;}

/* typography */
.display{font-family:var(--font-display);font-weight:800;letter-spacing:-0.02em;}
.eyebrow{font-family:var(--font-display);font-weight:700;text-transform:uppercase;letter-spacing:.18em;font-size:11px;color:var(--dim);}
.h1{font-family:var(--font-display);font-weight:800;font-size:26px;letter-spacing:-0.02em;line-height:1.1;}
.h2{font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:-0.01em;}
.h3{font-family:var(--font-display);font-weight:700;font-size:15px;}
.muted{color:var(--dim);} .faint{color:var(--faint);}
.grad-text{background:linear-gradient(120deg,var(--primary-2),#bfe0f3 60%,var(--text));-webkit-background-clip:text;background-clip:text;color:transparent;}
.gold-text{background:linear-gradient(120deg,var(--gold),var(--gold-2));-webkit-background-clip:text;background-clip:text;color:transparent;}
.num{font-family:var(--font-display);font-weight:800;font-variant-numeric:tabular-nums;}

/* surfaces */
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow-sm);}
.card-2{background:var(--surface-2);border:1px solid var(--border);border-radius:18px;}
.glass{background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));backdrop-filter:blur(14px);border:1px solid var(--border-2);}
.hairline{height:1px;background:var(--border);border:0;margin:0;}

/* buttons */
.btn{font-family:var(--font-display);font-weight:700;border:none;cursor:pointer;border-radius:14px;padding:14px 18px;font-size:15px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s ease,filter .15s ease,background .2s;color:var(--text);background:var(--surface-3);}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--primary-2),var(--primary-deep));color:#fff;box-shadow:0 12px 28px -12px var(--primary);}
.btn-primary:hover{filter:brightness(1.06);}
.btn-gold{background:linear-gradient(135deg,var(--gold-2),var(--gold));color:#1a1206;box-shadow:0 12px 28px -12px var(--gold);}
.btn-ghost{background:transparent;border:1px solid var(--border-2);}
.btn-block{width:100%;}
.btn-sm{padding:9px 13px;font-size:13px;border-radius:11px;}
.icon-btn{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:var(--surface-2);border:1px solid var(--border);cursor:pointer;color:var(--text);transition:transform .15s;}
.icon-btn:active{transform:scale(.92);}

/* chips/pills */
.chip{font-family:var(--font-display);font-weight:600;font-size:12.5px;padding:8px 13px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);color:var(--dim);cursor:pointer;white-space:nowrap;transition:all .18s;}
.chip.on{background:var(--primary-soft);border-color:var(--primary);color:var(--primary-2);}
.tag{font-family:var(--font-display);font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:4px 8px;border-radius:7px;background:var(--surface-3);color:var(--dim);}
.tag.gold{background:var(--gold-soft);color:var(--gold);} .tag.blue{background:var(--primary-soft);color:var(--primary-2);} .tag.green{background:var(--green-soft);color:var(--green);}

.row{display:flex;align-items:center;} .between{justify-content:space-between;} .gap{gap:12px;} .gap-s{gap:8px;} .gap-l{gap:18px;}
.col{display:flex;flex-direction:column;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;} .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.hscroll{display:flex;gap:12px;overflow-x:auto;padding:2px 18px;scroll-snap-type:x mandatory;}
.hscroll::-webkit-scrollbar{display:none;} .hscroll>*{scroll-snap-align:start;flex:0 0 auto;}

/* progress bars */
.bar{height:9px;border-radius:99px;background:var(--surface-3);overflow:hidden;}
.bar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--primary-2),var(--primary));transition:width .6s cubic-bezier(.2,.8,.2,1);}
.bar.gold>i{background:linear-gradient(90deg,var(--gold-2),var(--gold));}
.bar.green>i{background:linear-gradient(90deg,#46c993,var(--green));}

/* nav */
.nav{position:absolute;left:0;right:0;bottom:0;padding:10px 8px calc(10px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg,rgba(10,14,19,0) 0%, var(--bg) 38%);}
.nav-inner{background:var(--surface);border:1px solid var(--border-2);border-radius:22px;display:flex;align-items:center;justify-content:space-around;padding:8px 6px;box-shadow:var(--shadow);}
.navitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;background:none;border:none;cursor:pointer;color:var(--faint);position:relative;transition:color .2s;}
.navitem .lbl{font-family:var(--font-display);font-weight:700;font-size:9px;letter-spacing:.02em;opacity:.85;}
.navitem.on{color:var(--primary-2);}
.navitem.on .lbl{color:var(--primary-2);}
.navitem.on::before{content:"";position:absolute;top:-2px;width:5px;height:5px;border-radius:99px;background:var(--gold);box-shadow:0 0 10px var(--gold);}
.nav-center{flex:0 0 auto;}
.nav-fab{width:54px;height:54px;border-radius:18px;display:flex;align-items:center;justify-content:center;margin-top:-16px;
  background:linear-gradient(135deg,var(--primary-2),var(--primary-deep));box-shadow:0 14px 30px -8px var(--primary);border:2px solid var(--bg-2);cursor:pointer;}

/* header */
.appbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px;}

/* modal/sheet */
.overlay{position:absolute;inset:0;background:rgba(2,5,8,0.62);backdrop-filter:blur(4px);z-index:60;display:flex;align-items:flex-end;animation:fadeIn .25s ease;}
.sheet{width:100%;max-height:92%;background:var(--surface);border-radius:26px 26px 0 0;border-top:1px solid var(--border-2);box-shadow:0 -20px 60px -20px rgba(0,0,0,.7);display:flex;flex-direction:column;animation:slideUp .35s cubic-bezier(.2,.9,.2,1);overflow:hidden;}
.sheet-grab{width:38px;height:4px;border-radius:99px;background:var(--border-3);margin:10px auto 4px;}
.full{position:absolute;inset:0;background:var(--bg);z-index:70;display:flex;flex-direction:column;animation:fadeIn .3s ease;}

/* avatar muscle */
.muscle-on{fill:var(--muscle);filter:drop-shadow(0 0 6px var(--muscle-glow));transition:fill .4s,filter .4s;}
.muscle-off{fill:var(--body-fill);transition:fill .4s;}

/* misc */
.dot{width:6px;height:6px;border-radius:99px;background:var(--primary);}
.kbd{font-family:var(--font-display);font-weight:800;font-size:11px;}
.shimmer{background:linear-gradient(110deg,var(--surface-2) 8%,var(--surface-3) 18%,var(--surface-2) 33%);background-size:200% 100%;animation:shimmer 1.4s linear infinite;}
.ring-wrap{position:relative;display:inline-flex;}
.float-particle{position:absolute;border-radius:99px;background:var(--primary);opacity:.5;}

/* animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
@keyframes rise{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes shimmer{to{background-position:-200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes spinSlow{to{transform:rotate(360deg)}}
@keyframes drawIn{to{stroke-dashoffset:0}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes confetti{0%{transform:translateY(-10vh) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.9}}
@keyframes flame{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.08) rotate(2deg)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 var(--primary-soft)}50%{box-shadow:0 0 0 14px transparent}}
.stagger>*{animation:rise .5s ease both;}
.stagger>*:nth-child(1){animation-delay:.04s}.stagger>*:nth-child(2){animation-delay:.1s}
.stagger>*:nth-child(3){animation-delay:.16s}.stagger>*:nth-child(4){animation-delay:.22s}
.stagger>*:nth-child(5){animation-delay:.28s}.stagger>*:nth-child(6){animation-delay:.34s}
.stagger>*:nth-child(7){animation-delay:.4s}.stagger>*:nth-child(8){animation-delay:.46s}

.tappable{cursor:pointer;transition:transform .15s;} .tappable:active{transform:scale(.98);}
input,textarea{font-family:var(--font-body);}
.field{width:100%;background:var(--surface-2);border:1px solid var(--border-2);border-radius:13px;padding:14px;color:var(--text);font-size:15px;outline:none;transition:border .2s;}
.field:focus{border-color:var(--primary);}
.field::placeholder{color:var(--faint);}
.seg{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:13px;padding:4px;gap:4px;}
.seg button{flex:1;border:none;background:none;color:var(--dim);font-family:var(--font-display);font-weight:700;font-size:13px;padding:9px;border-radius:10px;cursor:pointer;transition:all .18s;}
.seg button.on{background:var(--primary);color:#fff;}

let _audio;
function sfx(kind){
  try{
    _audio = _audio || new (window.AudioContext||window.webkitAudioContext)();
    const ctx=_audio; if(ctx.state==="suspended") ctx.resume();
    const now=ctx.currentTime;
    const notes = {
      tick:[[660,0.08]], complete:[[523,0.12],[784,0.18]], mission:[[587,0.1],[880,0.16]],
      levelup:[[523,0.1],[659,0.1],[784,0.1],[1046,0.28]], achievement:[[659,0.1],[988,0.12],[1318,0.3]],
      tap:[[440,0.05]],
    }[kind] || [[440,0.08]];
    notes.forEach((n,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type="sine"; o.frequency.value=n[0];
      const t=now+i*0.09;
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.14,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,t+n[1]);
      o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+n[1]+0.02);
    });
  }catch(e){}
}

/* speech */
function speak(text, lang, on){
  if(!on || !window.speechSynthesis) return;
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang = {pt:"pt-BR",en:"en-US",es:"es-ES",fr:"fr-FR",de:"de-DE"}[lang]||"pt-BR";
    u.rate=1.02; u.pitch=1;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>

/* ============================ ONBOARDING ============================ */
function Onboarding(){
  const { t, setView, updateUser, trainer, user, units, seedPlan } = useStore();
  const [step,setStep]=useState(0);
  const [d,setD]=useState({ name:user.name||"", age:28, sex:"male", height:175, weight:80, goal:"g_lose", level:"intermediate", focus:["abs","chest"], restr:["none"], loc:"loc_gym", days:["MO","WE","FR"], time:45, work:"clt" });
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const toggle=(k,v)=>setD(p=>({...p,[k]: p[k].includes(v) ? p[k].filter(x=>x!==v) : [...p[k],v]}));
  const steps = ["q_name","q_age","q_sex","q_body","q_goal","q_level","q_focus","q_sched","q_summary"];
  const total = steps.length;
  const comments = {
    q_name:"Prazer! Vou cuidar da sua evolução de perto.",
    q_age:"Idade ajuda a calibrar intensidade e recuperação.",
    q_sex:"Isso personaliza seu avatar e referências.",
    q_body:"Com isso calculo suas metas calóricas.",
    q_goal:"Perfeito. Vou montar tudo em torno disso.",
    q_level:"Vou começar no ponto certo pra você.",
    q_focus:"Esses músculos terão atenção extra.",
    q_sched:"Vou encaixar treinos na sua rotina real.",
    q_summary:"Tudo pronto. Bora transformar!",
  };
  const next=()=>{ sfx("tap"); if(step<total-1) setStep(step+1); };
  const prev=()=>{ if(step>0) setStep(step-1); else setView("auth"); };
  const finish=()=>{ updateUser({ name:d.name||"Atleta", age:d.age, sex:d.sex, height:d.height, weight:d.weight, goal:d.goal, level:d.level, focus:d.focus, restr:d.restr, loc:d.loc, days:d.days, time:d.time, work:d.work }); seedPlan(d); sfx("levelup"); setView("app"); };
  const key = steps[step];
  const goals = ["g_lose","g_muscle","g_define","g_strength","g_cond","g_health","g_resist","g_keep"];
  const u = units==="imperial";

  return (
    <div className="screen">
      <div className="appbar">
        <button className="icon-btn" onClick={prev}><ChevronLeft size={20}/></button>
        <div className="bar" style={{flex:1,margin:"0 14px"}}><i style={{width:`${((step+1)/total)*100}%`}}/></div>
        <span className="kbd muted">{step+1}/{total}</span>
      </div>

      {/* trainer comment */}
      <div className="pad" style={{paddingTop:6,paddingBottom:8}}>
        <div className="row gap" style={{alignItems:"flex-start"}}>
          <div style={{width:44,height:44,borderRadius:13,background:`radial-gradient(circle,${trainer?.color||"var(--primary)"}55,var(--surface-2))`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{trainer?.emoji||"🏋️"}</div>
          <div className="card-2" style={{padding:"10px 13px",flex:1}}>
            <div className="faint" style={{fontSize:10,marginBottom:2}}>{trainer?.name||"Treinador"}</div>
            <div style={{fontSize:13.5,lineHeight:1.4}}>{comments[key]}</div>
          </div>
        </div>
      </div>

      <div className="scroll pad" style={{paddingTop:8}}>
        <h1 className="h1" style={{marginBottom:18}}>{t(key)}</h1>

        {key==="q_name" && <input className="field" style={{fontSize:18,padding:18}} autoFocus placeholder={t("name")} value={d.name} onChange={e=>set("name",e.target.value)}/>}

        {key==="q_age" && (
          <div className="col gap">
            <div className="card" style={{padding:24,textAlign:"center"}}>
              <div className="num grad-text" style={{fontSize:54}}>{d.age}</div>
              <input type="range" min="14" max="80" value={d.age} onChange={e=>set("age",+e.target.value)} style={{width:"100%",marginTop:10,accentColor:"var(--primary)"}}/>
            </div>
          </div>
        )}

        {key==="q_sex" && (
          <div className="grid2">
            {[["male",t("male")],["female",t("female")]].map(([k,v])=>(
              <button key={k} className="card tappable" onClick={()=>set("sex",k)} style={{padding:18,border:d.sex===k?"1.5px solid var(--primary)":"1px solid var(--border)"}}>
                <div style={{height:120,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{transform:"scale(.66)"}}><BodyAvatar sex={k} highlight={d.sex===k?["chest","quads"]:[]} size={110}/></div></div>
                <div className="h3" style={{textAlign:"center",marginTop:6}}>{v}</div>
              </button>
            ))}
          </div>
        )}

        {key==="q_body" && (
          <div className="col gap">
            <div className="card" style={{padding:18}}>
              <div className="row between"><span className="muted">Altura</span><span className="num" style={{fontSize:22}}>{u?`${Math.round(d.height/2.54)}in`:`${d.height}cm`}</span></div>
              <input type="range" min="140" max="210" value={d.height} onChange={e=>set("height",+e.target.value)} style={{width:"100%",marginTop:8,accentColor:"var(--primary)"}}/>
            </div>
            <div className="card" style={{padding:18}}>
              <div className="row between"><span className="muted">Peso</span><span className="num" style={{fontSize:22}}>{u?`${Math.round(d.weight*2.205)}lb`:`${d.weight}kg`}</span></div>
              <input type="range" min="40" max="160" value={d.weight} onChange={e=>set("weight",+e.target.value)} style={{width:"100%",marginTop:8,accentColor:"var(--primary)"}}/>
            </div>
          </div>
        )}

        {key==="q_goal" && (
          <div className="grid2">
            {goals.map(g=>{
              const active=d.goal===g;
              return (
                <button key={g} className="card tappable" onClick={()=>{set("goal",g);sfx("tap");}}
                  style={{padding:"16px 12px",textAlign:"center",borderRadius:14,border:active?"1.5px solid var(--primary)":"1px solid var(--border)"}}>
                  <span style={{color:active?"var(--primary-2)":"var(--text)",fontWeight:700,fontFamily:"var(--font-display)"}}>{t(g)}</span>
                  {active && <Check size={15} style={{marginLeft:6,verticalAlign:"middle",color:"var(--primary-2)"}}/>}
                </button>
              );
            })}
          </div>
        )}

        {key==="q_level" && (
          <div className="col gap">
            {[["beginner","Começando agora ou voltando"],["intermediate","Treino há alguns meses"],["advanced","Treino consistente há anos"]].map(([k,desc])=>(
              <button key={k} className="card tappable" onClick={()=>set("level",k)} style={{padding:16,textAlign:"left",border:d.level===k?"1.5px solid var(--primary)":"1px solid var(--border)"}}>
                <div className="row between"><span className="h3">{t(k)}</span>{d.level===k&&<CheckCircle2 size={18} color="var(--primary-2)"/>}</div>
                <div className="faint" style={{fontSize:12,marginTop:4}}>{desc}</div>
              </button>
            ))}
          </div>
        )}

        {key==="q_focus" && (
          <div className="row gap" style={{alignItems:"flex-start"}}>
            <div style={{flex:"0 0 auto"}}><BodyAvatar sex={d.sex} highlight={d.focus} size={130}/></div>
            <div className="col gap-s" style={{flex:1}}>
              {MUSCLES.filter(m=>["chest","abs","shoulders","biceps","back","quads","glutes","calves"].includes(m)).map(m=>(
                <button key={m} className="chip" style={{width:"100%",textAlign:"left",padding:"11px 13px",
                  background:d.focus.includes(m)?"var(--primary-soft)":"var(--surface-2)",
                  borderColor:d.focus.includes(m)?"var(--primary)":"var(--border)",
                  color:d.focus.includes(m)?"var(--primary-2)":"var(--text)"}} onClick={()=>{toggle("focus",m);sfx("tap");}}>{MUSCLE_PT[m]}</button>
              ))}
            </div>
          </div>
        )}

        {key==="q_sched" && (
          <div className="col gap">
            <div className="card" style={{padding:16}}>
              <div className="eyebrow" style={{marginBottom:10}}>Dias disponíveis</div>
              <div className="row" style={{gap:6,justifyContent:"space-between"}}>
                {[["SU","D"],["MO","S"],["TU","T"],["WE","Q"],["TH","Q"],["FR","S"],["SA","S"]].map(([k,v])=>(
                  <button key={k} onClick={()=>{toggle("days",k);sfx("tap");}} style={{width:38,height:38,borderRadius:11,border:"none",cursor:"pointer",
                    fontFamily:"var(--font-display)",fontWeight:700,background:d.days.includes(k)?"var(--primary)":"var(--surface-3)",color:d.days.includes(k)?"#fff":"var(--dim)"}}>{v}</button>
                ))}
              </div>
            </div>
            <div className="card" style={{padding:16}}>
              <div className="row between"><span className="eyebrow">Tempo por treino</span><span className="num" style={{fontSize:18}}>{d.time} min</span></div>
              <div className="seg" style={{marginTop:10}}>
                {[15,30,45,60,90].map(tm=>(<button key={tm} className={d.time===tm?"on":""} onClick={()=>set("time",tm)} style={{fontSize:12}}>{tm}</button>))}
              </div>
            </div>
            <div className="card" style={{padding:16}}>
              <div className="eyebrow" style={{marginBottom:10}}>Rotina de trabalho</div>
              <div className="seg">
                {[["clt","CLT"],["auto","Autônomo"],["student","Estudante"],["free","Flexível"]].map(([k,v])=>(<button key={k} className={d.work===k?"on":""} onClick={()=>set("work",k)} style={{fontSize:12}}>{v}</button>))}
              </div>
              <p className="faint" style={{fontSize:11,marginTop:10}}>A IA usa isso + feriados do seu país para sugerir os melhores horários.</p>
            </div>
          </div>
        )}

        {key==="q_summary" && (
          <div className="col gap">
            <div className="card" style={{padding:22,textAlign:"center",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",inset:0,background:`radial-gradient(circle at 50% 0%, ${trainer?.color||"var(--primary)"}33, transparent 70%)`}}/>
              <div style={{position:"relative"}}>
                <BodyAvatar sex={d.sex} highlight={d.focus} size={120}/>
                <div className="h2" style={{marginTop:6}}>{t("planReady")}</div>
                <p className="muted" style={{fontSize:13,marginTop:6}}>{d.name}, montei seu plano de {t(d.goal).toLowerCase()} com foco em {d.focus.map(m=>MUSCLE_PT[m]).slice(0,3).join(", ")}.</p>
              </div>
            </div>
            <div className="grid3">
              <StatPill icon={<Calendar size={15}/>} label="Dias" value={`${d.days.length}x`}/>
              <StatPill icon={<Clock size={15}/>} label="Tempo" value={`${d.time}m`}/>
              <StatPill icon={<Target size={15}/>} label="Nível" value={t(d.level).slice(0,4)}/>
            </div>
          </div>
        )}
      </div>

      <div className="pad" style={{paddingTop:8,paddingBottom:"calc(18px + env(safe-area-inset-bottom))"}}>
        {step<total-1
          ? <button className="btn btn-primary btn-block" style={{padding:16}} onClick={next} disabled={key==="q_name"&&!d.name}>{t("next")} <ArrowRight size={18}/></button>
          : <button className="btn btn-gold btn-block" style={{padding:17}} onClick={finish}>{t("enterApp")} <Sparkles size={18}/></button>}
      </div>
    </div>
  );
}

                <button className="nav-fab" onClick={()=>{setTab("ai");sfx("tap");}}><Icon size={24} color="#fff"/></button>
              </div>
            );
            return (
              <button key={tb.id} className={`navitem ${on?"on":""}`} onClick={()=>{setTab(tb.id);sfx("tap");}}>
                <Icon size={21}/><span className="lbl">{t(tb.key)}</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* overlays */}
      <Overlays/>
    </div>
  );
}

/* ---- WORKOUT PLAYER (full screen) ---- */
function WorkoutPlayer(){
  const { t, user, trainer, todayWorkout, closeFull, finishWorkout, sound } = useStore();
  const [idx,setIdx]=useState(0);
  const [setNum,setSetNum]=useState(1);
  const [resting,setResting]=useState(false);
  const [rest,setRest]=useState(60);
  const ex = todayWorkout.exercises[idx];
  const exData = EXERCISES.find(e=>e.id===ex.exId) || EXERCISES[0];
  const [load,setLoad]=useState(ex.load);
  const [reps,setReps]=useState(ex.reps);

  useEffect(()=>{ setLoad(todayWorkout.exercises[idx].load); setReps(todayWorkout.exercises[idx].reps); setSetNum(1); },[idx]);
  useEffect(()=>{
    if(!resting) return;
    if(rest<=0){ setResting(false); sfx("complete"); return; }
    const tm=setTimeout(()=>{ setRest(r=>{ if(r<=4&&r>1) sfx("tick"); return r-1; }); },1000);
    return ()=>clearTimeout(tm);
  },[resting,rest]);

  const completeSet=()=>{
    sfx("complete");
    if(setNum<ex.sets){ setSetNum(setNum+1); setRest(60); setResting(true); }
    else { // next exercise
      if(idx<todayWorkout.exercises.length-1){ setRest(75); setResting(true); setTimeout(()=>setIdx(idx+1),0); }
      else { finish(); }
    }
  };
  const finish=()=>{ closeFull(); finishWorkout(); };
  const progress=(idx + setNum/ex.sets)/todayWorkout.exercises.length;

  return (
    <div className="full">
      <div className="appbar"><button className="icon-btn" onClick={closeFull}><X size={18}/></button>
        <div className="bar" style={{flex:1,margin:"0 14px"}}><i style={{width:`${progress*100}%`}}/></div>
        <span className="kbd muted">{idx+1}/{todayWorkout.exercises.length}</span>
      </div>

      {resting ? (
        <div className="scroll" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:24}}>
          <div className="eyebrow" style={{color:"var(--primary-2)"}}>{t("rest")}</div>
          <Ring value={rest/75} size={180} stroke={10} color="var(--primary-2)">
            <div className="num" style={{fontSize:52}}>{rest}</div><div className="faint" style={{fontSize:12}}>seg</div>
          </Ring>
          <div className="faint" style={{fontSize:13,marginTop:18}}>Próximo: {EXERCISES.find(e=>e.id===todayWorkout.exercises[Math.min(idx,todayWorkout.exercises.length-1)].exId)?.name}</div>
          <div className="row gap-s" style={{marginTop:20}}>
            <button className="btn btn-ghost" onClick={()=>setRest(r=>r+15)}>+15s</button>
            <button className="btn btn-primary" onClick={()=>{setResting(false);sfx("tap");}}>Pular descanso</button>
          </div>
        </div>
      ) : (
        <div className="scroll pad">
          {/* video/avatar */}
          <div style={{height:230,borderRadius:18,background:`linear-gradient(135deg,${trainer?.color||"var(--primary)"}33,var(--surface-2))`,position:"relative",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <BodyAvatar sex={user.sex} highlight={exData.muscles} size={170}/>
            <span className="tag" style={{position:"absolute",top:12,left:12,background:"rgba(0,0,0,.4)",color:"#fff"}}>♫ Spotify conectado</span>
          </div>
          <h1 className="h1" style={{marginTop:16}}>{exData.name}</h1>
          <div className="row gap-s" style={{marginTop:8,flexWrap:"wrap"}}>{exData.muscles.map(m=>(<span key={m} className="tag" style={{background:"var(--muscle)",color:"#1a1206"}}>{MUSCLE_PT[m]}</span>))}</div>

          <div className="card" style={{marginTop:18,padding:16}}>
            <div className="row between"><span className="muted">Série</span><span className="num" style={{fontSize:18}}>{setNum} / {ex.sets}</span></div>
            <div className="faint" style={{fontSize:12,marginTop:6}}>{t("lastTime")}: {ex.lastLoad}kg × {ex.reps} · <span style={{color:"var(--primary-2)"}}>{t("suggested")}: {ex.load}kg</span></div>
            <div className="grid2" style={{marginTop:14}}>
              <div className="card-2" style={{padding:12}}>
                <div className="faint" style={{fontSize:11,textAlign:"center"}}>Carga (kg)</div>
                <div className="row between" style={{marginTop:6}}>
                  <button className="icon-btn" onClick={()=>setLoad(Math.max(0,load-2.5))}><Minus size={16}/></button>
                  <span className="num" style={{fontSize:24}}>{load}</span>
                  <button className="icon-btn" onClick={()=>setLoad(load+2.5)}><Plus size={16}/></button>
                </div>
              </div>
              <div className="card-2" style={{padding:12}}>
                <div className="faint" style={{fontSize:11,textAlign:"center"}}>Reps</div>
                <div className="row between" style={{marginTop:6}}>
                  <button className="icon-btn" onClick={()=>setReps(Math.max(1,reps-1))}><Minus size={16}/></button>
                  <span className="num" style={{fontSize:24}}>{reps}</span>
                  <button className="icon-btn" onClick={()=>setReps(reps+1)}><Plus size={16}/></button>
                </div>
              </div>
            </div>
            <button className="btn btn-primary btn-block" style={{marginTop:14,padding:15}} onClick={completeSet}><Check size={18}/> {t("setDone")}</button>
          </div>

          <button className="btn btn-ghost btn-block" style={{marginTop:12}} onClick={finish}>{t("finishWorkout")}</button>
          <div style={{height:24}}/>
        </div>
      )}

/* ============================ AI CHAT (real Anthropic API) ============================ */
function AITab(){
  const { t, trainer, user, lang, premium, openModal, sound, setSound } = useStore();
  const tName = trainer?.name?.split(" ")[0] || "Coach";
  const [msgs,setMsgs]=useState([{ role:"assistant", text:`Olá ${user.name}! Sou ${trainer?.name||"seu treinador"}. 💪 Pode me perguntar qualquer coisa sobre treino, dieta, execução de exercícios — ou me mandar uma foto da sua refeição ou postura que eu analiso pra você.` }]);
  const [input,setInput]=useState("");
  const [img,setImg]=useState(null);
  const [loading,setLoading]=useState(false);
  const [freeUsed,setFreeUsed]=useState(0);
  const [rec,setRec]=useState(false);
  const scrollRef=useRef(null);
  const recogRef=useRef(null);
  const FREE_LIMIT=5;

  useEffect(()=>{ scrollRef.current?.scrollTo(0,scrollRef.current.scrollHeight); },[msgs,loading]);

  const suggestions = ["Como melhorar meu agachamento?","Monte um plano de dieta pra hoje","Quantas proteínas eu preciso?","Estou desmotivado, me ajuda"];

  const pickImg=(e)=>{
    const f=e.target.files?.[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>setImg({ data:r.result, media: f.type }); r.readAsDataURL(f);
  };

  const toggleMic=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ alert("Reconhecimento de voz não suportado neste navegador."); return; }
    if(rec){ recogRef.current?.stop(); setRec(false); return; }
    const r=new SR(); recogRef.current=r;
    r.lang={pt:"pt-BR",en:"en-US",es:"es-ES",fr:"fr-FR",de:"de-DE"}[lang]||"pt-BR";
    r.interimResults=false; r.continuous=false;
    r.onresult=(ev)=>{ setInput(prev=> (prev?prev+" ":"")+ev.results[0][0].transcript); };
    r.onend=()=>setRec(false);
    try{ r.start(); setRec(true); }catch(e){ setRec(false); }
  };

  const send=async()=>{
    if((!input.trim()&&!img)||loading) return;
    if(!premium && freeUsed>=FREE_LIMIT){ openModal("paywall"); return; }
    const userMsg={ role:"user", text:input.trim(), image: img?.data };
    const history=[...msgs,userMsg];
    setMsgs(history); setInput(""); const sentImg=img; setImg(null); setLoading(true);
    if(!premium) setFreeUsed(f=>f+1);
    sfx("tap");

    if(!window.__AEXORE_AI_PROXY){ setTimeout(function(){ setMsgs(function(m){return m.concat([{role:"assistant",text:"\ud83d\udcaa No site publicado, o chat com IA entra no ar assim que voc\u00ea conectar o servidor de IA \u2014 me chama no Claude que eu configuro pra voc\u00ea. (Aqui dentro do app do Claude ele j\u00e1 responde normalmente.)"}]);}); setLoading(false); },450); return; }
    const persona=`Você é ${trainer?.name}, um personal trainer de elite do app Aexore. Especialidade: ${trainer?.spec}. Personalidade: ${trainer?.personality}. 
Fale como esse treinador: ${trainer?.tagline} 
Responda SEMPRE em ${ {pt:"português do Brasil",en:"English",es:"español",fr:"français",de:"Deutsch"}[lang] }.
Seja motivador, prático e direto. Use no máximo 2-3 parágrafos curtos. Pode usar 1-2 emojis. Dê conselhos seguros; recomende procurar um médico para dores/lesões.
Perfil do aluno: nome ${user.name}, ${user.age||"?"} anos, ${user.sex==="female"?"mulher":"homem"}, ${user.height||"?"}cm, ${user.weight||"?"}kg, objetivo "${t(user.goal||"g_health")}", nível "${t(user.level||"intermediate")}", treina em "${t(user.loc||"loc_gym")}".`;

    try{
      const convo = history[0]?.role==="assistant" ? history.slice(1) : history;
      const apiMsgs=convo.map(m=>{
        if(m.image){
          const b64=m.image.split(",")[1]; const media=(sentImg?.media)||"image/jpeg";
          return { role:m.role, content:[ {type:"image",source:{type:"base64",media_type:media,data:b64}}, {type:"text",text:m.text||"Analise esta imagem."} ] };
        }
        return { role:m.role, content:m.text };
      });
      const res=await fetch((window.__AEXORE_AI_PROXY||"https://api.anthropic.com/v1/messages"),{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system:persona, messages:apiMsgs })
      });
      const data=await res.json();
      const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim() || "Desculpe, não consegui responder agora. Tenta de novo? 💪";
      setMsgs(m=>[...m,{role:"assistant",text}]);
      speak(text,lang,sound);
    }catch(err){
      setMsgs(m=>[...m,{role:"assistant",text:"Tive um problema de conexão agora. Tenta novamente em instantes. 🙏"}]);
    }finally{ setLoading(false); }
  };

  return (
    <div className="screen">
      <div className="appbar" style={{borderBottom:"1px solid var(--border)"}}>
        <div className="row gap-s">
          <div style={{width:40,height:40,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,background:`radial-gradient(circle,${trainer?.color||"var(--primary)"}55,var(--surface-2))`}}>{trainer?.emoji||"🏋️"}</div>
          <div><div className="h3">{trainer?.name||"IA Coach"}</div><div className="faint row gap-s" style={{fontSize:11}}><span style={{width:6,height:6,borderRadius:99,background:"var(--success)"}}/> online · IA</div></div>
        </div>
        <button className="icon-btn" onClick={()=>{setSound(!sound); if(sound) window.speechSynthesis?.cancel();}}>{sound?<Volume2 size={18}/>:<VolumeX size={18}/>}</button>
      </div>

      <div className="scroll" ref={scrollRef} style={{padding:"16px 16px 8px"}}>
        {!premium && <div className="card-2" style={{padding:"8px 12px",marginBottom:14,fontSize:11.5,textAlign:"center",color:"var(--dim)"}}>
          {FREE_LIMIT-freeUsed} {t("freeMsgs")} · <span className="gold-text" style={{fontWeight:700,cursor:"pointer"}} onClick={()=>openModal("paywall")}>{t("upgradeUnlimited")}</span>
        </div>}
        <div className="col gap">
          {msgs.map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
              <div style={{maxWidth:"82%",padding:"11px 14px",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",
                background:m.role==="user"?"linear-gradient(135deg,var(--primary-2),var(--primary-deep))":"var(--surface-2)",
                color:m.role==="user"?"#fff":"var(--text)",border:m.role==="user"?"none":"1px solid var(--border)"}}>
                {m.image && <img src={m.image} alt="" style={{width:"100%",borderRadius:10,marginBottom:8,maxHeight:200,objectFit:"cover"}}/>}
                <div style={{fontSize:14,lineHeight:1.5,whiteSpace:"pre-wrap"}}>{m.text}</div>
              </div>
            </div>
          ))}
          {loading && <div style={{display:"flex"}}><div style={{padding:"14px 16px",borderRadius:"16px 16px 16px 4px",background:"var(--surface-2)",border:"1px solid var(--border)"}}>
            <div className="row gap-s">{[0,1,2].map(i=>(<span key={i} style={{width:7,height:7,borderRadius:99,background:"var(--primary-2)",animation:`pulse 1s ${i*0.2}s infinite`}}/>))}</div>
          </div></div>}
        </div>

        {msgs.length<=1 && !loading && (
          <div className="col gap-s" style={{marginTop:18}}>
            <div className="eyebrow">{t("askTrainer")}</div>
            {suggestions.map((s,i)=>(<button key={i} className="card tappable" style={{padding:"12px 14px",textAlign:"left",fontSize:13.5}} onClick={()=>setInput(s)}>{s}</button>))}
          </div>
        )}
      </div>

      {/* input bar */}
      <div style={{padding:"10px 14px calc(14px + env(safe-area-inset-bottom))",borderTop:"1px solid var(--border)",background:"var(--surface)"}}>
        {img && <div className="row between card-2" style={{padding:8,marginBottom:8}}><div className="row gap-s"><img src={img.data} alt="" style={{width:38,height:38,borderRadius:8,objectFit:"cover"}}/><span className="faint" style={{fontSize:12}}>Imagem anexada</span></div><button className="icon-btn" style={{width:32,height:32}} onClick={()=>setImg(null)}><X size={14}/></button></div>}
        <div className="row gap-s" style={{alignItems:"flex-end"}}>
          <label className="icon-btn" style={{cursor:"pointer",flexShrink:0}}><ImageIcon size={18}/><input type="file" accept="image/*" style={{display:"none"}} onChange={pickImg}/></label>
          <button className="icon-btn" style={{flexShrink:0,background:rec?"var(--danger)":"var(--surface-2)",color:rec?"#fff":"var(--text)"}} onClick={toggleMic}><Mic size={18}/></button>
          <div style={{flex:1,background:"var(--surface-2)",border:"1px solid var(--border-2)",borderRadius:14,padding:"4px 6px 4px 14px",display:"flex",alignItems:"center"}}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")send();}} placeholder={t("typeMessage")} style={{flex:1,background:"none",border:"none",outline:"none",color:"var(--text)",fontSize:14,padding:"8px 0"}}/>
          </div>
          <button className="icon-btn" style={{flexShrink:0,background:"linear-gradient(135deg,var(--primary-2),var(--primary-deep))",color:"#fff"}} onClick={send} disabled={loading}><Send size={17}/></button>
        </div>
      </div>
    </div>
  );
}

function CalculatorsModal(){
  const { t, closeModal, user } = useStore();
  const [w,setW]=useState(user.weight||80);
  const [h,setH]=useState(user.height||175);
  const [a,setA]=useState(user.age||28);
  const [sex,setSex]=useState(user.sex||"male");
  const [act,setAct]=useState(1.55);

  const tmb = sex==="male" ? (10*w+6.25*h-5*a+5) : (10*w+6.25*h-5*a-161);
  const tdee=tmb*act;
  const deficit=tdee-500;
  const prot=Math.round(w*2);

  const imcCat = imc<18.5?"Abaixo":imc<25?"Normal":imc<30?"Sobrepeso":"Obesidade";

    <Sheet title={t("calculators")} onClose={()=>closeModal("calculators")}>
      <div className="scroll pad" style={{paddingTop:6}}>
        <div className="card-2" style={{padding:14,marginBottom:14}}>

          <div className="grid2 gap-s">

            <label className="col gap-s"><span className="faint" style={{fontSize:11}}>Altura (cm)</span><input className="field" type="number" value={h} onChange={e=>setH(+e.target.value)}/></label>
            <label className="col gap-s"><span className="faint" style={{fontSize:11}}>Idade</span><input className="field" type="number" value={a} onChange={e=>setA(+e.target.value)}/></label>
            <div className="col gap-s"><span className="faint" style={{fontSize:11}}>Sexo</span>
              <div className="seg"><button className={sex==="male"?"on":""} onClick={()=>setSex("male")} style={{fontSize:12}}>M</button><button className={sex==="female"?"on":""} onClick={()=>setSex("female")} style={{fontSize:12}}>F</button></div></div>
          </div>
          <div className="col gap-s" style={{marginTop:10}}>
            <span className="faint" style={{fontSize:11}}>Nível de atividade</span>
            <div className="seg">{[[1.2,"Sedentário"],[1.375,"Leve"],[1.55,"Moderado"],[1.725,"Intenso"]].map(([v,l])=>(<button key={v} className={act===v?"on":""} onClick={()=>setAct(v)} style={{fontSize:11}}>{l}</button>))}</div>
          </div>
        </div>
        <div className="col gap-s">
          <Row label={t("cal_imc")} value={imc.toFixed(1)} sub={imcCat} color="var(--primary-2)"/>
          <Row label={t("cal_tmb")} value={`${Math.round(tmb)} kcal`} sub="Metabolismo basal"/>
          <Row label={t("cal_tdee")} value={`${Math.round(tdee)} kcal`} sub="Gasto energético total" color="var(--green)"/>
          <Row label={t("cal_def")} value={`${Math.round(deficit)} kcal`} sub="Para emagrecer (-0.5kg/sem)" color="var(--gold)"/>
          <Row label={t("cal_prot")} value={`${prot}g`} sub="2g por kg de peso"/>
          <Row label={t("cal_water")} value={`${(water/1000).toFixed(1)}L`} sub="35ml por kg" color="var(--primary-2)"/>
        </div>
        <div style={{height:20}}/>
      </div>

  );

  const weekly=[{d:"Seg",v:42},{d:"Ter",v:55},{d:"Qua",v:38},{d:"Qui",v:60},{d:"Sex",v:48},{d:"Sáb",v:72},{d:"Dom",v:30}];

  const celebrate=(type)=>{ setCeleb(true); setTimeout(()=>setCeleb(false),2800); if(type==="levelup") setTimeout(()=>openModal("levelUp"),300); };

    const chosen=pool.slice(0,count);

    setTodayWorkout({

      focusLabel: MUSCLE_PT[groups[0]]?.toLowerCase()||"corpo",
      minutes: d.time||45,
      exercises: chosen.map((e,i)=>({ exId:e.id, sets: d.level==="beginner"?3:4, reps: e.type==="cardio"?15:e.group==="abs"?15:10, lastLoad: e.equip==="peso corporal"?0:baseLoad-5, load: e.equip==="peso corporal"?0:baseLoad })),
    });
    // tailor nutrition goal roughly from TDEE
    const tmb = d.sex==="male"?(10*d.weight+6.25*d.height-5*d.age+5):(10*d.weight+6.25*d.height-5*d.age-161);
    const tdee=Math.round(tmb*1.5);
    const goalCal = d.goal==="g_lose"?tdee-450:d.goal==="g_muscle"?tdee+300:tdee;
    setNutrition(n=>({...n, kcalGoal:Math.round(goalCal/10)*10, pGoal:Math.round(d.weight*2), cGoal:Math.round(goalCal*0.4/4), fGoal:Math.round(goalCal*0.25/9), fibGoal:30 }));
  };

  const effTheme = theme==="auto" ? ((new Date().getHours()>=7&&new Date().getHours()<19)?"light":"dark") : theme;

  const store={ view,setView, tab,setTab, theme,setTheme, lang,setLang, units,setUnits, fontScale,setFontScale, sound,setSound,
    trainer,setTrainer, premium,setPremium, user,updateUser, xp, streak, workoutsDone, rank,
    water, waterGoal, setWater:setWaterFn, todayWorkout, missions, toggleMission, nutrition, addMeal,
    weekly, weightHistory, t, openModal, closeModal, modals, openFull, closeFull, full,
    celebrate, finishWorkout, awardWorkout, lastWorkout, seedPlan };

  return (
    <Ctx.Provider value={store}>
      <style dangerouslySetInnerHTML={{__html:CSS}}/>
      <div className="ax-root" data-theme={effTheme} style={{fontSize:`${fontScale}em`}}>
        <div className="shell">
          {view==="splash" && <Splash/>}
          {view==="welcome" && <Welcome/>}
          {view==="trainer" && <TrainerSelect/>}
          {view==="auth" && <Auth/>}
          {view==="onboarding" && <Onboarding/>}
          {view==="app" && <MainApp/>}
          <Confetti go={celeb}/>
        </div>
      </div>
    </Ctx.Provider>
  );
}

try {
  const __r = document.getElementById("root");
  createRoot(__r).render(React.createElement(App));
  const b = document.getElementById("boot");
  if (b) setTimeout(function(){ b.style.display="none"; }, 350);
} catch (e) {
  document.getElementById("boot").innerHTML = "<div style='padding:24px;text-align:center;color:#df6a6a;font-family:system-ui'>Erro ao carregar.<br/><span style='font-size:12px;color:#94a3b1'>"+(e&&e.message||e)+"</span></div>";
}
</script>
</body>
</html>
